<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERA UNICA — Браслети</title>
    <style>
        /* Тот самый бежевый фон, как на главной */
        body { 
            font-family: sans-serif; 
            background-color: #f9f6f2; 
            margin: 0; 
            text-align: center; 
        }
        
        .logo { width: 200px; margin-top: 20px; }
        
        /* Стиль текста под логотипом */
        .subtitle { 
            letter-spacing: 5px; 
            text-transform: uppercase; 
            font-size: 12px; 
            color: #333; 
            margin-bottom: 40px;
        }

        .catalog-container { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            padding: 20px; 
            flex-wrap: wrap; 
        }

        /* Белые карточки товаров с тенью */
        .product-card { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            width: 250px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        .product-card img { 
            height: 100px; 
            object-fit: contain; 
            margin-bottom: 15px; 
        }
/* Контейнер для рядка пошуку */
.search-container {
    text-align: center;
    margin: 20px 0 30px 0;
}

/* Стиль самого вікна вводу */
#searchInput {
    width: 80%;
    max-width: 350px;
    padding: 10px 20px;
    border: 1px solid #b8926a;
    border-radius: 25px;
    font-size: 16px;
    outline: none;
    font-family: sans-serif;
}
        .price { color: #b8926a; font-weight: bold; }

        .buy-btn { 
            background: #1a1a1a; 
            color: white; 
            border: none; 
            padding: 10px; 
            width: 100%; 
            cursor: pointer; 
            border-radius: 5px; 
            text-transform: uppercase; 
        }
h1 {
    font-family: 'Cormorant Garamond', serif; 
    font-style: normal; /* Змінили з italic на normal, щоб слово стояло прямо */
    font-weight: 300;   /* Залишаємо найтонший варіант шрифту */
    font-size: 36px; 
    color: #b8926a; 
    text-transform: uppercase; /* Робимо великими літерами для більшої грації */
    letter-spacing: 6px;       /* Додаємо простір між літерами */
    margin-top: 40px;
}

    </style>

</head> 

<body>
<div class="search-container">
    <input type="text" id="searchInput" onkeyup="searchProduct()" placeholder="Пошук браслетів...">
</div>

<button class="menu-btn" onclick="toggleMenu()" style="position: fixed; top: 10px; left: 10px; z-index: 1000; background: #1a1a1a; color: white; border: none; padding: 12px 20px; cursor: pointer; border-radius: 5px; font-family: sans-serif; font-size: 16px; font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
    ☰
</button><div id="sidebar" class="sidebar" style="position: fixed; left: -250px; top: 0; width: 250px; height: 100%; background: white; transition: 0.3s; z-index: 1001; box-shadow: 2px 0 10px rgba(0,0,0,0.1); padding-top: 60px; text-align: left;">
    <style>
        .sidebar a { display: block; padding: 15px 25px; text-decoration: none; color: #333; text-transform: uppercase; font-size: 14px; font-family: sans-serif; border-bottom: 1px solid #f4f4f4; }
        .sidebar a:hover { background-color: #f9f6f2; color: #b8926a; }
    </style>
    <a href="index.html">Головна сторінка</a>
    <a href="novinki.html">Новинки</a>
    <a href="bracelets.html">Браслети</a>
    <a href="charms.html">Шарми</a>
<a href="sale.html">SALE%</a>

</div>
    <header>
        <img src="logo.png" alt="Vera Unica Logo" class="logo">
        <p class="subtitle">СТВОРИ СВІЙ АВТОРСЬКИЙ БРАСЛЕТ</p>
        <h1 style="color: #b8926a; text-transform: uppercase;">Браслети</h1>
    </header>

    <div class="catalog-container">

 <div class="product-card">
            <img src="braslet.pystoy.jpg">
            <h3>Срібний браслет</h3>
            <p class="price">Стара ціна 499 грн</p>
        </div>

<div class="product-card">
            <img src="braslet.gold.jpg">
            <h3>Золотий браслет</h3>
            <p class="price">499 грн</p>
<span class="out-of-stock">немає в наявності</span>
    </div>

    </div>
<script>
    // Функція, яка висуває або ховає меню
    function toggleMenu() {
        let sb = document.getElementById('sidebar');
        if (sb.style.left === '0px') {
            sb.style.left = '-250px';
        } else {
            sb.style.left = '0px';
        }
    }

    // Закриваємо меню, якщо клікнули в будь-якому іншому місці екрана
    document.addEventListener('click', function(event) {
        let sb = document.getElementById('sidebar');
        let btn = document.querySelector('.menu-btn');
        if (!sb.contains(event.target) && event.target !== btn) {
            sb.style.left = '-250px';
        }
    });
</script>
    </body>
</html>
