.slider-container {

.slides {
    display: flex;
    width: 200%;
    height: 100%;
    animation: slide-animation 10s infinite; /* Автоматичне гортання */
}

.slide {
    width: 50%;
    height: 100%;
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Фото заповнює блок без деформації */
}

@keyframes slide-animation {
    0% { transform: translateX(0); }
    45% { transform: translateX(0); }
    50% { transform: translateX(-50%); }
    95% { transform: translateX(-50%); }
    100% { transform: translateX(0); }
}

.main-btn {
    display: inline-block;

}

.main-btn:hover {
    background: #b8926a; /* Золотистий при наведенні */
    transform: translateY(-3px);
}
/* Налаштування для 3-х слайдів */
.slides {
    display: flex;

}

.slide {

}

/* Анімація перемикання */

}
