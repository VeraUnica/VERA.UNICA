    <style>

        /* Тот самый бежевый фон, как на главной */
        body { 
            font-family: sans-serif;

            margin: 0; 
            text-align: center; 
        }
        
        .logo { width: 200px; margin-top: 20px; }
        
        /* Стиль текста под логотипом */
        .subtitle { 
            letter-spacing: 5px; 
            text-transform: uppercase; 
            font-size: 12px; 
            color: #333; 
            margin-bottom: 40px;
        }

        .catalog-container { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            padding: 20px; 
            flex-wrap: wrap; 
        }

        /* Белые карточки товаров с тенью */
        .product-card { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            width: 250px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        .product-card img { 
            height: 100px; 
            object-fit: contain; 
            margin-bottom: 15px; 
        }

        .price { color: #b8926a; font-weight: bold; }

        .buy-btn { 
            background: #1a1a1a; 
            color: white; 
            border: none; 
            padding: 10px; 
            width: 100%; 
            cursor: pointer; 
            border-radius: 5px; 
            text-transform: uppercase; 
        }
h1 {
    font-family: 'Cormorant Garamond', serif; 
    font-style: normal; /* Змінили з italic на normal, щоб слово стояло прямо */
    font-weight: 300;   /* Залишаємо найтонший варіант шрифту */
    font-size: 36px; 
    color: #b8926a; 
    text-transform: uppercase; /* Робимо великими літерами для більшої грації */
    letter-spacing: 6px;       /* Додаємо простір між літерами */
    margin-top: 40px;
}
/* Універсальний стиль для цін зі знижкою */
.price-wrapper {
    display: flex;
    align-items: center;
    gap: 10px; /* Відступ між цінами */
    justify-content: center; /* Центрування, якщо картки по центру */
}

.old-price {
    text-decoration: line-through;
    color: #999;
    font-size: 14px;
}

.new-price {
    color: #b8926a; /* Твій фірмовий золотистий */
    font-weight: bold;
    font-size: 18px;
}

/* Картка товару стає гнучким контейнером */
.product-card {
    display: flex;
    flex-direction: column; /* Елементи йдуть один за одним зверху вниз */
    justify-content: space-between; /* Розтягує контент: фото зверху, ціна знизу */
    height: 100%; /* Картки будуть однакової висоти */
    background: white;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

/* Фіксуємо місце для назви, щоб вона не штовхала ціну */
.product-card h3 {
    min-height: 50px; /* Висота приблизно для двох рядків тексту */
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
    font-size: 18px;
}

/* Блок з ціною тепер завжди на своєму місці */
.price-wrapper {
    margin-top: auto; /* Це головний секрет — штовхає ціну в самий низ */
    padding-top: 10px;
}




    </style>
</head>

<script>
    // Функція, яка висуває або ховає меню
    function toggleMenu() {
        let sb = document.getElementById('sidebar');
        if (sb.style.left === '0px') {
            sb.style.left = '-250px';
        } else {
            sb.style.left = '0px';
        }
    }

    // Закриваємо меню, якщо клікнули в будь-якому іншому місці екрана
    document.addEventListener('click', function(event) {
        let sb = document.getElementById('sidebar');
        let btn = document.querySelector('.menu-btn');
        if (!sb.contains(event.target) && event.target !== btn) {
            sb.style.left = '-250px';
        }
    });
</script>
